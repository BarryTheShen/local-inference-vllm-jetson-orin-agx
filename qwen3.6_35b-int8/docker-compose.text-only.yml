# Experimental overlay: text-only non-MTP profile.
# Apply with the base compose file after stopping its running server:
#   docker compose -f docker-compose.yml -f docker-compose.text-only.yml up
services:
  vllm-35b-int8:
    command:
      - /models/Qwen3.6-35B-A3B-INT8-AutoRound
      - --served-model-name=qwen3.6-35b-a3b-int8
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --tokenizer=/models/Qwen3.6-35B-A3B-tokenizer
      - --language-model-only
      - --dtype=bfloat16
      - --max-model-len=32768
      - --gpu-memory-utilization=0.65
      - --max-num-seqs=1
      - --max-num-batched-tokens=4096
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      - --attention-backend=FLASHINFER
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_xml
